name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Git tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'
      release_notes_path:
        description: 'Committed release notes markdown path'
        required: true
        default: 'release-notes/v0.1.0.md'
      allow_existing_tag:
        description: 'Allow rerun with existing tag (update release asset/body)'
        required: true
        default: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      # 1) Checkout full history/tags for safe tag existence check
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Setup .NET 8
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3) Validate existing tag policy
      - name: Validate tag policy
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}"
          $allow = "${{ github.event.inputs.allow_existing_tag }}"
          git fetch --tags --force
          $exists = git tag -l $tag
          if ($exists -and $allow -ne 'true') {
            throw "Tag already exists: $tag. Set allow_existing_tag=true to rerun and update release assets/body."
          }
          if ($exists -and $allow -eq 'true') {
            Write-Host "Tag already exists: $tag. Continuing (rerun mode)."
          }

      # 4) Parse committed release notes (# title / body)
      - name: Parse release notes
        id: notes
        shell: pwsh
        run: |
          ./scripts/parse-release-notes.ps1 -Path "${{ github.event.inputs.release_notes_path }}"

      # 5) Restore
      - name: Restore
        run: dotnet restore src/MaskedPi.App/MaskedPi.App.csproj

      # 6) Build
      - name: Build
        run: dotnet build src/MaskedPi.App/MaskedPi.App.csproj --configuration Release --no-restore

      # 7) Publish (single-file)
      - name: Publish
        run: >
          dotnet publish src/MaskedPi.App/MaskedPi.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output artifacts/publish

      # 8) Create package layout and zip
      - name: Package release ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $packageRoot = "artifacts/package"
          $libsDir = Join-Path $packageRoot "Libs"

          if (Test-Path $packageRoot) {
            Remove-Item -Path $packageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $libsDir | Out-Null

          Get-ChildItem -Path artifacts/publish -File | ForEach-Object {
            if ($_.Extension -eq ".dll") {
              Copy-Item -Path $_.FullName -Destination $libsDir -Force
            } else {
              Copy-Item -Path $_.FullName -Destination $packageRoot -Force
            }
          }

          Get-ChildItem -Path artifacts/publish -Directory | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination (Join-Path $packageRoot $_.Name) -Recurse -Force
          }

          $zipName = "maskedpi-${{ github.event.inputs.version }}-win-x64-selfcontained.zip"
          Compress-Archive -Path "$packageRoot/*" -DestinationPath "artifacts/$zipName" -Force
          "zip_path=artifacts/$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        id: pack

      # 9) Create GitHub Release and 10) upload zip asset
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ steps.notes.outputs.title }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: ${{ steps.pack.outputs.zip_path }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          append_body: false
